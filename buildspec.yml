version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo "📦 Preparando o ambiente e instalando dependências..."
      # Usando pip3 para garantir a versão correta no Linux da AWS
      - pip3 install -r requirements.txt
  
  pre_build:
    commands:
      - echo "🔍 Verificando estrutura de pastas..."
      - mkdir -p data/raw data/processed models
      
  build:
    commands:
      - echo "📊 Iniciando a Análise Exploratória de Dados (EDA)..."
      - python3 src/extract_gdc.py
      - echo "🧹 Limpando e processando os dados..."
      - python3 src/process_matrix.py
      - echo "🚀 Iniciando a Extração de Dados Clínicos..."
      - python3 src/extract_clinical.py
      - echo "🧠 Treinando o algoritmo Random Forest..."
      - python3 src/train.py
      
artifacts:
  files:
    - models/modelo_sobrevivencia_gbm_v1.pkl
  name: gbm-model-artifact